    // ============ INPUT SANITIZATION ============
    function sanitize(str) {
      if (typeof str !== 'string') return '';
      return str
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#x27;').replace(/\//g, '&#x2F;');
    }

    // ============ AUTO-SAVE INDICATOR ============
    let _autoSaveTimer = null;
    function showSaveIndicator(st) {
      const el  = document.getElementById('autoSaveIndicator');
      const ico = document.getElementById('autoSaveIcon');
      const txt = document.getElementById('autoSaveText');
      if (!el) return;
      el.className = 'visible ' + st;
      if (st === 'saving') { ico.textContent = '\u23f3'; txt.textContent = 'Saving\u2026'; }
      else if (st === 'saved')  { ico.textContent = '\u2705'; txt.textContent = 'Saved'; }
      else if (st === 'error')  { ico.textContent = '\u274c'; txt.textContent = 'Save failed'; }
      clearTimeout(_autoSaveTimer);
      _autoSaveTimer = setTimeout(() => { el.className = ''; }, 3500);
    }

    // ============ FIREBASE BRIDGE ============
    let _db = null;
    let _dbOnline = false;
    let _firebaseReadyResolve;
    const _firebaseReadyPromise = new Promise(res => { _firebaseReadyResolve = res; });

    window.__onFirebaseReady = function(db) {
      _db = db;
      _dbOnline = true;
      _firebaseReadyResolve();
      const badge = document.getElementById('dbStatusBadge');
      if (badge) {
        badge.innerHTML = '<span class="db-status-dot"></span>DB Online';
        badge.className = 'db-status';
      }
      console.log('[Firebase] Ready \u2713');
    };

    // ============ FIRESTORE SAVE / LOAD ============
    // Strategy: dual-write to BOTH localStorage (instant) and Firestore (cloud).
    // On load: try Firestore first; fall back to localStorage if offline.
    // This ensures data is never lost even when the client is temporarily offline.

    const LS_KEY = 'dts_state_v2';

    function buildPayload() {
      return {
        projects:        state.projects,
        customElements:  state.customElements,
        navigationLinks: state.navigationLinks,
        featureCards:    state.featureCards,
        suggestions:     state.suggestions,
        announcements:   state.announcements,
        personalFiles:   state.personalFiles,
        devCloudFiles:   state.devCloudFiles,
        chatMessages:    state.chatMessages,
        activityLog:     state.activityLog,
        tasks:           state.tasks     || [],
        raidMode:        state.raidMode  || false,
        pageViews:       state.pageViews || {},
        pageTexts:       state.pageTexts || {},
        theme:           state.theme,
        savedAt:         new Date().toISOString()
      };
    }

    function applyPayload(d) {
      if (!d) return false;
      state.projects        = d.projects        || [];
      state.customElements  = d.customElements  || [];
      state.navigationLinks = d.navigationLinks || state.navigationLinks;
      state.featureCards    = d.featureCards    || state.featureCards;
      state.suggestions     = d.suggestions     || [];
      state.announcements   = d.announcements   || [];
      state.personalFiles   = d.personalFiles   || [];
      state.devCloudFiles   = d.devCloudFiles   || [];
      state.chatMessages    = d.chatMessages    || [];
      state.activityLog     = d.activityLog     || [];
      state.tasks           = d.tasks           || [];
      state.raidMode        = d.raidMode        || false;
      state.pageViews       = d.pageViews       || {};
      // Merge saved pageTexts over defaults so new keys added in code aren't wiped
      state.pageTexts       = Object.assign({}, state.pageTexts, d.pageTexts || {});
      state.theme           = d.theme           || 'light';
      document.getElementById('app').className = 'app ' + state.theme;
      if (state.raidMode) applyRaidMode(true);
      return true;
    }

    // --- localStorage helpers ---
    function saveToLocalCache(payload) {
      try {
        localStorage.setItem(LS_KEY, JSON.stringify(payload));
      } catch(e) { console.warn('[LocalCache] Write failed:', e); }
    }

    function loadFromLocalCache() {
      try {
        const raw = localStorage.getItem(LS_KEY);
        if (raw) return JSON.parse(raw);
      } catch(e) { console.warn('[LocalCache] Read failed:', e); }
      return null;
    }

    // --- Main save: localStorage first (sync), then Firestore (async, best-effort) ---
    async function saveToFirestore() {
      showSaveIndicator('saving');
      const payload = buildPayload();

      // 1. Always save to localStorage immediately
      saveToLocalCache(payload);

      // 2. Attempt Firestore save (won't block the UI even if it fails)
      if (window.__firestoreOps) {
        try {
          await window.__firestoreOps.save(payload);
          showSaveIndicator('saved');
          console.log('[Firestore] Saved \u2713', new Date().toLocaleTimeString());
        } catch (err) {
          // Offline or quota error — data is safe in localStorage, will sync when back online
          showSaveIndicator('saved'); // still show saved (it IS saved locally)
          console.warn('[Firestore] Cloud save pending (offline?) — data saved locally:', err.message);
        }
      } else {
        // Firebase not ready yet — data is safe in localStorage
        showSaveIndicator('saved');
        console.warn('[Firestore] Not ready — data saved locally only');
      }
    }

    function saveToLocalStorage() { saveToFirestore(); }

    // --- Load: Firestore with localStorage fallback ---
    async function loadFromFirestore() {
      // Try Firestore first
      if (window.__firestoreOps) {
        try {
          const d = await window.__firestoreOps.load();
          if (d) {
            applyPayload(d);
            // Keep localStorage in sync with the cloud version
            saveToLocalCache(d);
            console.log('[Firestore] Loaded \u2713 (saved', d.savedAt, ')');
            return true;
          }
        } catch (err) {
          console.warn('[Firestore] Cloud load failed, trying local cache:', err.message);
        }
      }

      // Firestore unavailable or offline — try localStorage
      const local = loadFromLocalCache();
      if (local) {
        applyPayload(local);
        console.log('[LocalCache] Loaded from localStorage (saved', local.savedAt, ')');
        // Update DB badge to show we're using local cache
        const badge = document.getElementById('dbStatusBadge');
        if (badge) {
          badge.innerHTML = '<span class="db-status-dot"></span>Local Cache';
          badge.className = 'db-status offline';
        }
        return true;
      }

      console.log('[Storage] No saved data found — starting fresh');
      return false;
    }

    // --- Retry queue: try to push pending local changes to Firestore when back online ---
    let _retryInterval = null;
    function startOfflineRetry() {
      if (_retryInterval) return;
      _retryInterval = setInterval(async () => {
        if (!window.__firestoreOps) return;
        const local = loadFromLocalCache();
        if (!local) return;
        try {
          await window.__firestoreOps.save(local);
          console.log('[Firestore] Offline data synced to cloud \u2713');
          clearInterval(_retryInterval);
          _retryInterval = null;
          const badge = document.getElementById('dbStatusBadge');
          if (badge) {
            badge.innerHTML = '<span class="db-status-dot"></span>DB Online';
            badge.className = 'db-status';
          }
        } catch (_) { /* still offline — try again later */ }
      }, 15000); // retry every 15s
    }

    // Auto-save every 30s for Developer+ (both cloud and local)
    setInterval(() => {
      if (state.currentUser && ['Owner','CoOwner','Developer'].includes(state.currentUser.rank)) {
        saveToFirestore();
      }
    }, 30000);

    // ============ BRUTE-FORCE PROTECTION ============
    // (constants declared earlier near sha256 helper to avoid TDZ issues)
    function isAuthLocked() {
      if (_authLockedUntil && Date.now() < _authLockedUntil) return true;
      if (_authLockedUntil && Date.now() >= _authLockedUntil) { _authAttempts=0; _authLockedUntil=0; }
      return false;
    }
    function recordFailedAttempt() {
      _authAttempts++;
      if (_authAttempts >= AUTH_MAX_ATTEMPTS) {
        _authLockedUntil = Date.now() + AUTH_LOCKOUT_MS;
        logActivity('Security', 'Auth locked after too many failed attempts');
        return true;
      }
      return false;
    }
    function remainingLockout() { return Math.ceil((_authLockedUntil - Date.now()) / 1000); }

    // ============ SESSION TIMEOUT (30 min) ============
    const SESSION_TIMEOUT_MS = 30 * 60 * 1000;
    let _sessionExpiry = 0;
    let _sessionInterval = null;

    function startSession() {
      _sessionExpiry = Date.now() + SESSION_TIMEOUT_MS;
      clearInterval(_sessionInterval);
      _sessionInterval = setInterval(tickSession, 10000);
      const t = document.getElementById('sessionTimer');
      if (t) t.style.display = 'inline';
    }
    function resetSession() { if (state.currentUser) _sessionExpiry = Date.now() + SESSION_TIMEOUT_MS; }
    function tickSession() {
      if (!state.currentUser) { clearInterval(_sessionInterval); return; }
      const remaining = _sessionExpiry - Date.now();
      const timer = document.getElementById('sessionTimer');
      if (!timer) return;
      if (remaining <= 0) {
        clearInterval(_sessionInterval); handleLogout();
        showNotification('Session Expired', 'Logged out due to inactivity', 'info'); return;
      }
      const mins = Math.floor(remaining/60000);
      const secs = Math.floor((remaining%60000)/1000);
      timer.textContent = '\u23f1 ' + mins + ':' + String(secs).padStart(2,'0');
      timer.className = remaining < 120000 ? 'warning' : '';
    }
    ['mousedown','keydown','touchstart'].forEach(evt => {
      document.addEventListener(evt, resetSession, { passive: true });
    });

    // ============ MOBILE NAV ============
    function toggleMobileNav() {
      const isOpen = document.getElementById('mobileNavDrawer').classList.contains('open');
      document.getElementById('mobileNavOverlay').classList.toggle('open', !isOpen);
      document.getElementById('mobileNavDrawer').classList.toggle('open', !isOpen);
      document.getElementById('hamburgerBtn').classList.toggle('open', !isOpen);
    }
    function closeMobileNav() {
      ['mobileNavOverlay','mobileNavDrawer'].forEach(id => {
        const el = document.getElementById(id); if (el) el.classList.remove('open');
      });
      const btn = document.getElementById('hamburgerBtn');
      if (btn) btn.classList.remove('open');
    }
    function renderMobileNav() {
      const el = document.getElementById('mobileNavLinks');
      if (!el) return;
      el.innerHTML = state.navigationLinks.filter(l=>l.enabled).map(link => `
        <button class="mobile-nav-link ${state.currentPage===link.page?'active':''}"
                onclick="changePage('${sanitize(link.page)}');closeMobileNav();">
          <svg>${link.icon}</svg> ${sanitize(link.label)}
        </button>
      `).join('');
    }

    // ============ KEYBOARD SHORTCUTS ============
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.querySelectorAll('.modal-overlay:not(.hidden)').forEach(m => m.classList.add('hidden'));
        closeMobileNav(); return;
      }
      if ((e.metaKey||e.ctrlKey) && e.key==='s') {
        e.preventDefault();
        if (state.currentUser) { saveToFirestore(); showNotification('Saved','Data saved to Firestore','success'); }
        return;
      }
      const tag = document.activeElement.tagName;
      if (tag !== 'INPUT' && tag !== 'TEXTAREA') {
        if (e.key === 't') { toggleTheme(); return; }
      }
      if ((e.metaKey||e.ctrlKey) && e.key==='k') {
        e.preventDefault(); if (state.currentUser) openAdminPanel(); return;
      }
    });

    // ============ ANTI-RAID MODE ============
    function applyRaidMode(active) {
      state.raidMode = active;
      const app = document.getElementById('app');
      const existing = document.getElementById('raidBanner');
      if (active) {
        if (app) app.classList.add('raid-active');
        if (!existing) {
          const b = document.createElement('div');
          b.id = 'raidBanner'; b.className = 'raid-banner';
          b.innerHTML = '\ud83d\udea8 ANTI-RAID MODE ACTIVE \u2014 Site locked to public visitors. Admins only. \ud83d\udea8';
          const nav = document.querySelector('.navbar');
          if (nav && nav.parentNode) nav.parentNode.insertBefore(b, nav.nextSibling);
        }
      } else {
        if (app) app.classList.remove('raid-active');
        if (existing) existing.remove();
      }
    }
    function toggleRaidMode() {
      if (!state.currentUser || !['Owner','CoOwner'].includes(state.currentUser.rank)) {
        showNotification('Access Denied','Owner/CoOwner only','error'); return;
      }
      applyRaidMode(!state.raidMode);
      showNotification(
        state.raidMode ? '\ud83d\udea8 Raid Mode ON' : '\u2705 Raid Mode OFF',
        state.raidMode ? 'Site locked to public visitors' : 'Site re-opened to visitors',
        state.raidMode ? 'error' : 'success'
      );
      logActivity('Anti-Raid', 'Raid mode ' + (state.raidMode ? 'ENABLED' : 'DISABLED'));
      saveToFirestore();
    }

    // ============ PAGE VIEW ANALYTICS ============
    function trackPageView(page) {
      if (!state.pageViews) state.pageViews = {};
      state.pageViews[page] = (state.pageViews[page] || 0) + 1;
    }

    // ============ TASKS ============
    function renderTasksSection(content) {
      const tasks = state.tasks || [];
      const canManage = canManageCards();
      content.innerHTML = `
        <div>
          <h3 style="color:#667eea;margin-bottom:1.5rem;">\ud83d\udccb Task Board</h3>
          ${canManage ? `
            <button class="btn-primary" style="margin-bottom:1.5rem;" onclick="openAddTaskModal()">
              <svg><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg> Add Task
            </button>
          ` : ''}
          ${tasks.length === 0 ? `
            <div style="text-align:center;padding:3rem;color:#999;">
              <div style="font-size:3rem;margin-bottom:1rem;">\u2705</div>
              <p>No tasks yet. Add one!</p>
            </div>
          ` : tasks.map(t => `
            <div class="task-item ${t.done?'done':''} ${t.priority}">
              <div class="task-checkbox ${t.done?'checked':''}" onclick="toggleTask('${sanitize(t.id)}')">
                ${t.done ? '\u2713' : ''}
              </div>
              <div style="flex:1;">
                <div class="task-title" style="${t.done?'text-decoration:line-through;':''}">${sanitize(t.title)}</div>
                ${t.description ? `<div class="task-meta">${sanitize(t.description)}</div>` : ''}
                <div class="task-meta" style="margin-top:0.3rem;">
                  <span class="task-priority ${t.priority}">${t.priority.toUpperCase()}</span>
                  ${t.assignee ? ' \u00b7 \ud83d\udc64 ' + sanitize(t.assignee) : ''}
                  ${t.dueDate  ? ' \u00b7 \ud83d\udcc5 ' + sanitize(t.dueDate)  : ''}
                  \u00b7 by ${sanitize(t.author)}
                </div>
              </div>
              ${canManage ? `
                <button class="btn-icon btn-danger" onclick="deleteTask('${sanitize(t.id)}')" title="Delete">
                  <svg><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                </button>
              ` : ''}
            </div>
          `).join('')}
        </div>
      `;
    }

    function openAddTaskModal() {
      document.getElementById('elementModalTitle').textContent = 'Add Task';
      document.getElementById('elementModalContent').innerHTML = `
        <label class="modal-label">Title *</label>
        <input type="text" id="taskTitle" class="modal-input" placeholder="Fix the login bug" maxlength="120"/>
        <label class="modal-label">Description</label>
        <textarea id="taskDesc" class="modal-input" rows="2" maxlength="500"></textarea>
        <label class="modal-label">Priority</label>
        <select id="taskPriority" class="modal-select">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
        <label class="modal-label">Assign To (optional)</label>
        <input type="text" id="taskAssignee" class="modal-input" placeholder="Username" maxlength="60"/>
        <label class="modal-label">Due Date (optional)</label>
        <input type="date" id="taskDue" class="modal-input"/>
        <div class="modal-buttons">
          <button class="btn-primary" onclick="saveTask()">Add Task</button>
          <button class="btn-danger" onclick="closeElementModal()">Cancel</button>
        </div>
      `;
      document.getElementById('elementModal').classList.remove('hidden');
    }

    function saveTask() {
      const title = document.getElementById('taskTitle').value.trim();
      if (!title) { showNotification('Error','Title required','error'); return; }
      if (!state.tasks) state.tasks = [];
      state.tasks.unshift({
        id: 'task_' + Date.now(),
        title,
        description: document.getElementById('taskDesc').value.trim(),
        priority:    document.getElementById('taskPriority').value,
        assignee:    document.getElementById('taskAssignee').value.trim(),
        dueDate:     document.getElementById('taskDue').value,
        author:      state.currentUser.username,
        done:        false,
        createdAt:   new Date().toISOString()
      });
      closeElementModal();
      showNotification('Task Added', title, 'success');
      logActivity('Task Added', title);
      saveToFirestore();
      renderAdminContent();
    }

    function toggleTask(id) {
      const t = (state.tasks||[]).find(t=>t.id===id);
      if (!t) return;
      t.done = !t.done;
      saveToFirestore();
      renderAdminContent();
    }

    function deleteTask(id) {
      if (!confirm('Delete this task?')) return;
      state.tasks = (state.tasks||[]).filter(t=>t.id!==id);
      saveToFirestore();
      renderAdminContent();
    }

    // ============ ANALYTICS SECTION ============
    function renderAnalyticsSection(content) {
      const views = state.pageViews || {};
      const totalViews = Object.values(views).reduce((a,b)=>a+b,0);
      const pages = ['home','about','contact','community','roblox','creations'];
      const maxV = Math.max(...pages.map(p=>views[p]||0),1);
      content.innerHTML = `
        <div>
          <h3 style="color:#667eea;margin-bottom:1.5rem;">\ud83d\udcca Site Analytics</h3>
          <div class="analytics-grid">
            ${[
              ['Total Views', totalViews],
              ['Projects', state.projects.length],
              ['Suggestions', state.suggestions.length],
              ['Open Tasks', (state.tasks||[]).filter(t=>!t.done).length]
            ].map(([label,val]) => `
              <div class="analytics-card">
                <div class="analytics-value">${val}</div>
                <div class="analytics-label">${label}</div>
              </div>
            `).join('')}
          </div>
          <h4 style="color:#667eea;margin-bottom:1rem;">Page View Breakdown</h4>
          <div style="display:flex;gap:8px;align-items:flex-end;height:80px;margin-bottom:1rem;">
            ${pages.map(p=>`
              <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;">
                <div style="width:100%;background:rgba(102,126,234,${state.currentPage===p?0.9:0.35});
                     border-radius:4px 4px 0 0;
                     height:${Math.round(((views[p]||0)/maxV)*60)+6}px;"></div>
                <span style="font-size:0.6rem;color:#999;">${p.substring(0,4)}</span>
                <span style="font-size:0.7rem;color:#667eea;font-weight:700;">${views[p]||0}</span>
              </div>
            `).join('')}
          </div>
          <button class="btn-danger" onclick="if(confirm('Reset analytics?')){state.pageViews={};saveToFirestore();renderAdminContent();showNotification('Done','Analytics reset','info');}">
            Reset Analytics
          </button>
        </div>
      `;
    }

    // ============ SCROLL PROGRESS & BACK-TO-TOP ============
    window.addEventListener('scroll', () => {
      const el = document.documentElement;
      const pct = el.scrollHeight - el.clientHeight > 0
        ? (el.scrollTop / (el.scrollHeight - el.clientHeight)) * 100 : 0;
      const bar = document.getElementById('scrollProgress');
      const btn = document.getElementById('backToTop');
      if (bar) bar.style.width = pct + '%';
      if (btn) btn.classList.toggle('visible', pct > 8);
    }, { passive: true });

    // ============ DARK MODE — SYSTEM PREFERENCE ============
    function applySystemThemeIfNeeded() {
      if (!localStorage.getItem('dts_theme_forced') &&
          window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        state.theme = 'dark';
        const app = document.getElementById('app');
        if (app) app.className = 'app dark';
      }
    }

    // ============ INITIALIZE ============
    function dismissLoadingScreen() {
      const ls = document.getElementById('loadingScreen');
      if (ls) ls.classList.add('fade-out');
    }

    async function init() {
      // HARD FAILSAFE — loading screen always dismissed within 8s no matter what
      const hardTimeout = setTimeout(dismissLoadingScreen, 8000);

      try {
        applySystemThemeIfNeeded();

        // Show skeleton while waiting for Firebase
        const pc = document.getElementById('pageContent');
        if (pc) pc.innerHTML = `
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-line"></div>
          <div class="skeleton skeleton-line short"></div>
          <div class="skeleton skeleton-card"></div>
        `;

        // Wait for Firebase module (max 6s before going offline)
        await Promise.race([
          _firebaseReadyPromise,
          new Promise(res => setTimeout(res, 6000))
        ]);

        if (_dbOnline) {
          await loadFromFirestore();
        } else {
          console.warn('[Firebase] Timed out — loading from local cache');
          const badge = document.getElementById('dbStatusBadge');
          if (badge) { badge.innerHTML = '<span class="db-status-dot"></span>DB Offline'; badge.className = 'db-status offline'; }
          // Still try to load from localStorage
          await loadFromFirestore();
          // Start background retry so data syncs when connectivity returns
          startOfflineRetry();
        }

        trackPageView(state.currentPage);
        renderNavigation();
        renderMobileNav();
        renderPage();
        logActivity('System', 'Website initialized');
      } catch (err) {
        // Something crashed — still render the page in a clean default state
        console.error('[init] Startup error:', err);
        try { renderNavigation(); renderMobileNav(); renderPage(); } catch(_) {}
      } finally {
        // Always dismiss the loading screen after a short visual pause
        clearTimeout(hardTimeout);
        setTimeout(dismissLoadingScreen, 800);
      }
    }

    init();
  </script>

  <!-- FIREBASE MODULE -->
  <!-- Uses plain getFirestore (NO offline persistence) to avoid all lock errors. -->
  <!-- Dual-write to localStorage handles the offline case in the main script.    -->
  <script type="module">
    import { initializeApp }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, doc, setDoc, getDoc }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey:            'AIzaSyBiMCXtdNKeYvcWi-rg1JL3lsuEVzOTliU',
      authDomain:        'dts-porfolio.firebaseapp.com',
      projectId:         'dts-porfolio',
      storageBucket:     'dts-porfolio.firebasestorage.app',
      messagingSenderId: '996654748916',
      appId:             '1:996654748916:web:db5704ed2671d3ee4e3aa1'
    };

    try {
      const app    = initializeApp(firebaseConfig);
      const db     = getFirestore(app);        // plain — no persistence, no lock errors
      const DOC_REF = doc(db, 'websiteState', 'main');

      // Helper: wrap a promise with a timeout so offline getDoc() doesn't hang
      function withTimeout(promise, ms) {
        return Promise.race([
          promise,
          new Promise((_, reject) =>
            setTimeout(() => reject(new Error('Firestore timeout')), ms)
          )
        ]);
      }

      window.__firestoreOps = {
        save: async (data) => {
          await setDoc(DOC_REF, data);
        },
        load: async () => {
          // 5-second timeout so offline load fails fast instead of hanging
          const snap = await withTimeout(getDoc(DOC_REF), 5000);
          return snap.exists() ? snap.data() : null;
        }
      };

      if (typeof window.__onFirebaseReady === 'function') {
        window.__onFirebaseReady(db);
      }

      console.log('[Firebase] Ready \u2713 (plain Firestore, no persistence lock)');

    } catch (err) {
      console.error('[Firebase] Init failed:', err);
      // __onFirebaseReady never called → 6s timeout in init() fires → offline mode
    }
  </script>
